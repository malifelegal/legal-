name: docs 배포 (수동 데이터 갱신 방식)

# 자동 데이터 수집은 사용하지 않습니다.
# (law.go.kr OpenAPI가 등록 IP에서만 응답 → GitHub Actions에서는 호출 불가)
# 데이터는 변환기로 만들어 docs/data/*.json 에 직접 커밋하고,
# 이 워크플로우는 docs 폴더를 GitHub Pages 로 배포만 합니다.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/update-data.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Pages 아티팩트 업로드 (docs)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
