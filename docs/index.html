<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>법령 모니터 · 미래에셋생명 법무팀</title>
    <meta
      name="description"
      content="법제처 입법예고·법령 공포/시행 사항을 한눈에. 주요 내용 요약과 첨부파일(제개정문·신구조문대비표) 바로보기·다운로드."
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="wrap">
        <div class="brand">
          <span class="logo">⚖️</span>
          <div>
            <h1>법령 모니터</h1>
            <p class="sub">입법예고 · 공포/시행 · 주요내용 · 첨부파일 한눈에</p>
          </div>
        </div>
        <div class="meta" id="meta">갱신 정보 로딩 중…</div>
      </div>
    </header>

    <nav class="tabs wrap" role="tablist">
      <button class="tab is-active" data-tab="laws" role="tab">
        📜 법령 공포·시행 <span class="count" id="count-laws">0</span>
      </button>
      <button class="tab" data-tab="bills" role="tab">
        📝 정부입법예고 <span class="count" id="count-bills">0</span>
      </button>
    </nav>

    <section class="wrap toolbar">
      <input
        type="search"
        id="search"
        placeholder="법령명 · 소관부처 검색…"
        autocomplete="off"
      />
      <div class="filters" id="filters"></div>
    </section>

    <main class="wrap">
      <div id="panel-laws" class="panel is-active"></div>
      <div id="panel-bills" class="panel"></div>
    </main>

    <footer class="wrap foot">
      <p>
        데이터 출처:
        <a href="https://www.law.go.kr" target="_blank" rel="noopener">국가법령정보센터</a>
        ·
        <a href="https://www.lawmaking.go.kr" target="_blank" rel="noopener">정부입법지원센터</a>
        — 본 사이트는 법무팀 내부 참고용이며, 효력 판단은 반드시 원문을 확인하세요.
      </p>
    </footer>

    <script src="./assets/app.js"></script>
  </body>
</html>
