<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>월간 법령 제·개정 현황 | 미래에셋생명 법무팀</title>
<style>
:root{--orange:#F58220;--orange-lt:#FEF0E3;--orange-md:#FDDCBA;--blue:#043B72;--blue-lt:#E8EFF7;--gray-1:#F7F8FA;--gray-2:#ECEFF4;--gray-3:#A0A6A8;--gray-4:#5A6370;--text:#1A1E23;--red:#D93025;--r-card:16px;--r-sm:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:var(--gray-1);color:var(--text);padding:40px 24px 64px;}
.wrap{max-width:1040px;margin:0 auto;}
.page-header{border-bottom:2px solid var(--orange);padding-bottom:18px;margin-bottom:24px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.eyebrow{font-size:10px;font-weight:800;letter-spacing:3px;color:var(--orange);text-transform:uppercase;margin-bottom:6px;}
.page-header h1{font-size:26px;font-weight:900;color:var(--blue);line-height:1.25;}
.header-right{font-size:11.5px;color:var(--gray-3);line-height:1.8;text-align:right;}
.header-right strong{color:var(--blue);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
.stat{background:#fff;border:1px solid var(--gray-2);border-radius:var(--r-card);padding:18px 20px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--orange);}
.stat .s-num{font-size:30px;font-weight:900;color:var(--blue);line-height:1;}
.stat .s-num small{font-size:14px;font-weight:700;color:var(--gray-3);margin-left:3px;}
.stat .s-label{font-size:11.5px;color:var(--gray-4);margin-top:7px;font-weight:600;}
.stat.accent::before{background:var(--blue);}
.stat.accent .s-num{color:var(--orange);}
.month-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;}
.month-tab{background:#fff;border:1px solid var(--gray-2);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;color:var(--gray-4);cursor:pointer;transition:.15s;}
.month-tab:hover{border-color:var(--orange-md);}
.month-tab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.month-tab .mt-count{font-size:11px;color:var(--gray-3);margin-left:6px;}
.month-tab.active .mt-count{color:var(--orange-md);}
.month-section{margin-bottom:34px;}
.month-section h2{font-size:16px;font-weight:900;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.month-section h2::before{content:'';width:4px;height:18px;border-radius:2px;background:var(--orange);}
.month-section .m-sub{font-size:12px;font-weight:600;color:var(--gray-3);}
.law-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.law-card{background:#fff;border:1px solid var(--gray-2);border-radius:var(--r-card);padding:22px 22px 20px;position:relative;display:flex;flex-direction:column;transition:border-color .15s,box-shadow .15s,transform .15s;}
.law-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;border-radius:var(--r-card) 0 0 var(--r-card);background:var(--gray-2);}
.law-card.has-news{cursor:pointer;}
.law-card.has-news:hover{border-color:var(--orange);box-shadow:0 6px 20px rgba(245,130,32,.13);transform:translateY(-2px);}
.law-card.impact-high::before{background:var(--orange);}
.law-card.impact-mid::before{background:var(--blue);}
.law-card.impact-low::before{background:var(--gray-3);}
.lc-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.badge{font-size:10.5px;font-weight:800;letter-spacing:.5px;padding:3px 9px;border-radius:6px;}
.badge.law{background:var(--orange-lt);color:#B45309;}
.badge.decree{background:var(--blue-lt);color:var(--blue);}
.badge.rule{background:var(--gray-2);color:var(--gray-4);}
.badge.rev{background:#fff;border:1px solid var(--gray-2);color:var(--gray-4);}
.impact-pill{margin-left:auto;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;}
.impact-pill.high{background:var(--orange);color:#fff;}
.impact-pill.mid{background:var(--blue);color:#fff;}
.impact-pill.low{background:var(--gray-2);color:var(--gray-4);}
.lc-name{font-size:16.5px;font-weight:800;color:var(--blue);line-height:1.4;margin-bottom:6px;}
.lc-no{font-size:11px;color:var(--gray-3);margin-bottom:12px;}
.lc-summary{font-size:13px;color:var(--gray-4);line-height:1.65;margin-bottom:14px;flex:1;}
.lc-dates{display:flex;gap:18px;margin-bottom:14px;}
.lc-date{font-size:11px;}
.lc-date .dl{color:var(--gray-3);display:block;margin-bottom:2px;font-weight:600;}
.lc-date .dv{color:var(--blue);font-weight:800;font-size:13px;}
.lc-date .dv.hi{color:var(--orange);}
.lc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.tag{font-size:10.5px;color:var(--gray-4);background:var(--gray-1);border:1px solid var(--gray-2);border-radius:6px;padding:3px 8px;}
.lc-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--gray-2);padding-top:14px;margin-top:auto;}
.lc-foot .ministry{font-size:11px;color:var(--gray-3);}
.news-btn{display:inline-flex;align-items:center;gap:7px;background:var(--orange);color:#fff;font-size:12.5px;font-weight:800;border:none;border-radius:8px;padding:9px 15px;cursor:pointer;transition:background .15s,transform .15s;}
.news-btn:hover{background:#e0741a;transform:translateX(2px);}
.news-soon{font-size:11.5px;font-weight:700;color:var(--gray-3);background:var(--gray-1);border:1px dashed var(--gray-3);border-radius:8px;padding:8px 14px;}
footer{max-width:1040px;margin:40px auto 0;border-top:1px solid var(--gray-2);padding-top:18px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--gray-3);}
footer strong{color:var(--blue);}
@media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr);}.law-grid{grid-template-columns:1fr;}}
#cn-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(4,59,114,.6);backdrop-filter:blur(4px);}
#cn-overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto;}
#cn-frame{background:#F7F8FA;border-radius:20px;width:100%;max-width:1000px;box-shadow:0 24px 80px rgba(0,0,0,.4);animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
#cn-close{position:sticky;top:12px;float:right;margin:12px 12px 0 0;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.95);border:none;cursor:pointer;font-size:20px;color:var(--blue);box-shadow:0 2px 12px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;transition:background .15s,transform .15s;}
#cn-close:hover{background:var(--orange);color:#fff;transform:scale(1.1);}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-header">
    <div>
      <div class="eyebrow">Monthly Law Update · 월간 제·개정 현황</div>
      <h1 id="dash-title">월간 법령 제·개정 현황</h1>
    </div>
    <div class="header-right">
      <strong id="team-name">미래에셋생명 법무팀</strong><br>
      <span id="updated">—</span> 기준
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="month-tabs" id="month-tabs"></div>
  <div id="sections"></div>
</div>
<footer>
  <strong>미래에셋생명 법무팀</strong>
  <span>본 자료는 사내 교육·공유 목적으로 제작되었습니다 · 법적 효력 판단은 반드시 원문을 확인하세요.</span>
</footer>
<div id="cn-overlay">
  <div id="cn-frame">
    <button id="cn-close" title="닫기 (ESC)">✕</button>
    <div id="cn-content"></div>
  </div>
</div>
<script>
const CARDNEWS = {
  "files/insurance-business-act.html": {"css": "\n/*\n * 미래에셋생명 법무팀 — 법령 제·개정 카드뉴스 디자인 시스템\n * 이 파일을 HTML <style> 태그 안에 그대로 삽입한다.\n * 색상·여백·타이포그래피를 임의로 바꾸지 말 것.\n */\n\n:root {\n  --orange:     #F58220;\n  --orange-lt:  #FEF0E3;\n  --orange-md:  #FDDCBA;\n  --blue:       #043B72;\n  --blue-lt:    #E8EFF7;\n  --gray-1:     #F7F8FA;\n  --gray-2:     #ECEFF4;\n  --gray-3:     #A0A6A8;\n  --gray-4:     #5A6370;\n  --text:       #1A1E23;\n  --red:        #D93025;\n  --r-card:     16px;\n  --r-sm:       10px;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\nbody {\n  font-family: 'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;\n  background: var(--gray-1);\n  padding: 48px 32px 64px;\n  color: var(--text);\n}\n.page-header {\n  max-width: 960px; margin: 0 auto 36px;\n  border-bottom: 2px solid var(--orange);\n  padding-bottom: 16px;\n  display: flex; align-items: flex-end;\n  justify-content: space-between; gap: 16px; flex-wrap: wrap;\n}\n.eyebrow { font-size:10px; font-weight:800; letter-spacing:3px; color:var(--orange); text-transform:uppercase; margin-bottom:5px; }\n.page-header h1 { font-size:24px; font-weight:900; color:var(--blue); line-height:1.25; }\n.header-right { font-size:11.5px; color:var(--gray-3); line-height:1.75; text-align:right; }\n.header-right strong { color:var(--blue); }\n.layout {\n  max-width: 960px; margin: 0 auto;\n  display: grid; grid-template-columns: 1fr 1fr; gap: 18px;\n}\n.card {\n  background: #fff; border-radius: var(--r-card);\n  border: 1px solid var(--gray-2); padding: 28px 26px 26px;\n  position: relative; overflow: hidden; display: flex; flex-direction: column;\n}\n.card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:var(--orange); }\n.card-tag { font-size:10px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase; color:var(--orange); margin-bottom:6px; }\n.card-num { position:absolute; top:16px; right:20px; font-size:48px; font-weight:900; color:var(--gray-2); line-height:1; letter-spacing:-2px; }\n.card h3 { font-size:17px; font-weight:800; color:var(--blue); line-height:1.4; margin-bottom:18px; }\n.row-full { grid-column: 1 / -1; }\n/* COVER */\n.card-cover { background:var(--blue); border-color:var(--blue); }\n.card-cover::before { background:var(--orange); }\n.card-cover .card-tag { color:var(--orange); }\n.card-cover h2 { font-size:22px; font-weight:900; color:#fff; line-height:1.4; margin:10px 0 16px; }\n.card-cover h2 em { color:var(--orange); font-style:normal; }\n.cover-desc { font-size:13px; color:rgba(255,255,255,0.6); line-height:1.7; margin-bottom:20px; flex:1; }\n.law-chips { display:flex; flex-direction:column; gap:8px; }\n.law-chip { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.13); border-radius:var(--r-sm); padding:10px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px; }\n.chip-label { font-size:11px; color:rgba(255,255,255,0.48); }\n.chip-val { font-size:13px; font-weight:700; color:#fff; }\n.chip-val.hi { color:var(--orange); }\n/* REASON LIST */\n.reason-list { list-style:none; flex:1; display:flex; flex-direction:column; justify-content:space-between; }\n.reason-list li { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid var(--gray-2); font-size:13px; color:var(--gray-4); line-height:1.6; }\n.reason-list li:last-child { border-bottom:none; }\n.ri { width:28px; height:28px; border-radius:8px; background:var(--orange-lt); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; margin-top:1px; }\n/* CHANGES */\n.changes-list { flex:1; display:flex; flex-direction:column; justify-content:space-between; }\n.ci { display:flex; align-items:flex-start; gap:12px; padding:11px 0; border-bottom:1px solid var(--gray-2); }\n.ci:last-child { border-bottom:none; }\n.sn { width:24px; height:24px; border-radius:50%; background:var(--orange); color:#fff; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }\n.ci strong { display:block; font-size:13px; font-weight:700; color:var(--blue); margin-bottom:2px; }\n.ci span { font-size:12px; color:var(--gray-4); line-height:1.5; }\n/* PENALTY */\n.card-penalty::before { background:var(--red); }\n.card-penalty .card-tag, .card-penalty h3 { color:var(--red); }\n.penalty-hero { background:linear-gradient(135deg,#FFF1F0,#FFE4E2); border:1px solid #FFCBC7; border-radius:14px; padding:18px; text-align:center; margin-bottom:16px; }\n.pct { font-size:54px; font-weight:900; color:var(--red); line-height:1; }\n.pct span { font-size:22px; }\n.pct-label { font-size:12px; color:#8B3A35; margin-top:5px; line-height:1.55; }\n.pct-label strong { color:var(--red); }\n.cond-row { display:flex; align-items:flex-start; gap:10px; font-size:12.5px; color:var(--gray-4); padding:9px 0; border-bottom:1px solid var(--gray-2); line-height:1.55; }\n.cond-row:last-of-type { border-bottom:none; }\n.rdot { width:6px; height:6px; border-radius:50%; background:var(--red); flex-shrink:0; margin-top:6px; }\n.miti { margin-top:14px; background:var(--blue-lt); border-left:3px solid var(--blue); border-radius:0 var(--r-sm) var(--r-sm) 0; padding:11px 14px; font-size:12px; color:var(--blue); line-height:1.65; }\n.miti strong { font-weight:800; }\n/* TIMELINE */\n.timeline { position:relative; padding-left:22px; flex:1; }\n.timeline::before { content:''; position:absolute; left:5px; top:8px; bottom:8px; width:2px; background:linear-gradient(to bottom, var(--orange), var(--gray-2)); }\n.tl-item { position:relative; padding-bottom:18px; }\n.tl-item:last-child { padding-bottom:0; }\n.tl-dot { position:absolute; left:-18px; top:4px; width:12px; height:12px; border-radius:50%; background:var(--orange-md); border:2px solid var(--orange); }\n.tl-dot.key { background:var(--orange); border-color:var(--blue); width:14px; height:14px; left:-19px; top:3px; }\n.tl-date { font-size:10.5px; font-weight:700; color:var(--gray-3); margin-bottom:2px; }\n.tl-date.k { color:var(--orange); }\n.tl-label { font-size:14px; font-weight:800; color:var(--blue); margin-bottom:2px; }\n.tl-desc { font-size:11.5px; color:var(--gray-4); line-height:1.55; }\n.kbadge { display:inline-block; background:var(--orange); color:#fff; font-size:9px; font-weight:800; padding:2px 7px; border-radius:20px; margin-left:6px; vertical-align:middle; }\n/* DECREE DETAILS */\n.it-list { flex:1; display:flex; flex-direction:column; justify-content:space-between; }\n.it-item { padding:13px 0; border-bottom:1px solid var(--gray-2); }\n.it-item:last-child { border-bottom:none; }\n.it-num-label { display:flex; align-items:center; gap:8px; margin-bottom:6px; }\n.it-circle { width:22px; height:22px; border-radius:50%; background:var(--blue); color:#fff; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }\n.it-item strong { font-size:13px; font-weight:700; color:var(--blue); }\n.it-item p { font-size:12px; color:var(--gray-4); line-height:1.6; padding-left:30px; }\n/* ACTION PLAN */\n.action-intro { font-size:13px; color:var(--gray-4); line-height:1.6; margin-bottom:18px; }\n.action-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }\n.ai { background:var(--gray-1); border:1px solid var(--gray-2); border-radius:var(--r-sm); padding:16px; }\n.ai .an { width:28px; height:28px; border-radius:8px; background:var(--blue); color:#fff; font-size:12px; font-weight:900; display:flex; align-items:center; justify-content:center; margin-bottom:10px; }\n.ai strong { display:block; font-size:13px; font-weight:800; color:var(--blue); margin-bottom:6px; line-height:1.4; }\n.ai p { font-size:12px; color:var(--gray-4); line-height:1.6; }\n.deadline-bar { margin-top:18px; background:var(--orange-lt); border:1px solid var(--orange-md); border-radius:var(--r-sm); padding:12px 18px; display:flex; align-items:center; gap:12px; font-size:13px; color:var(--blue); }\n.deadline-bar .di { font-size:18px; flex-shrink:0; }\n.deadline-bar strong { color:var(--orange); font-weight:800; }\n/* SOURCE DOCS */\n.card-refs::before { background:var(--blue); }\n.card-refs .card-tag, .card-refs h3 { color:var(--blue); }\n.refs-desc { font-size:12.5px; color:var(--gray-4); margin-bottom:18px; line-height:1.6; }\n.refs-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }\n.ref-group { background:var(--gray-1); border:1px solid var(--gray-2); border-radius:var(--r-sm); padding:16px 18px; }\n.ref-group-label { font-size:10.5px; font-weight:800; letter-spacing:1.5px; color:var(--gray-3); text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:7px; }\n.ref-group-label::before { content:\"\"; display:inline-block; width:3px; height:13px; border-radius:2px; background:var(--blue); }\n.ref-group.law-act .ref-group-label::before { background:var(--orange); }\n.ref-links { display:flex; flex-direction:column; gap:8px; }\n.ref-link { display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--gray-2); border-radius:8px; padding:11px 14px; text-decoration:none; color:inherit; transition:border-color .15s,box-shadow .15s; }\n.ref-link:hover { border-color:var(--blue); box-shadow:0 2px 8px rgba(4,59,114,.10); }\n.ref-group.law-act .ref-link:hover { border-color:var(--orange); box-shadow:0 2px 8px rgba(245,130,32,.12); }\n.ref-link-inner { display:flex; align-items:center; gap:10px; }\n.ref-icon { width:32px; height:32px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; background:var(--blue-lt); }\n.ref-group.law-act .ref-icon { background:var(--orange-lt); }\n.ref-text strong { display:block; font-size:13px; font-weight:700; color:var(--blue); margin-bottom:2px; }\n.ref-group.law-act .ref-text strong { color:#B45309; }\n.ref-text span { font-size:11px; color:var(--gray-3); }\n.ref-arrow { font-size:14px; color:var(--gray-3); flex-shrink:0; transition:transform .15s,color .15s; }\n.ref-link:hover .ref-arrow { transform:translateX(3px); color:var(--blue); }\n.ref-group.law-act .ref-link:hover .ref-arrow { color:var(--orange); }\n.refs-note { margin-top:14px; background:var(--blue-lt); border-left:3px solid var(--blue); border-radius:0 var(--r-sm) var(--r-sm) 0; padding:10px 14px; font-size:11.5px; color:var(--blue); line-height:1.65; }\n/* CALLOUT */\n.callout { background:var(--orange-lt); border-left:3px solid var(--orange); border-radius:0 var(--r-sm) var(--r-sm) 0; padding:11px 14px; font-size:12px; color:#7A4A00; line-height:1.65; margin-top:14px; }\n.callout strong { font-weight:800; color:var(--orange); }\n/* FOOTER */\nfooter { max-width:960px; margin:32px auto 0; border-top:1px solid var(--gray-2); padding-top:16px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; font-size:11px; color:var(--gray-3); }\nfooter strong { color:var(--blue); }\n\n", "body": "<div class=\"page-header\">\n  <div>\n    <div class=\"eyebrow\">Law Update · 법령 제·개정 안내<\/div>\n    <h1>보험업법 개정 핵심 정리<\/h1>\n  <\/div>\n  <div class=\"header-right\">\n    <strong>미래에셋생명 법무팀<\/strong><br>\n    2026. 06. 발행<br>\n    법률 제20987호\n  <\/div>\n<\/div>\n\n<div class=\"layout\">\n\n  <!-- 커버 -->\n  <div class=\"card card-cover\">\n    <div class=\"card-tag\">Overview<\/div>\n    <h2>보험업법,<br><em>모집질서·제재<\/em>가 강화됩니다<\/h2>\n    <p class=\"cover-desc\">설명의무와 부당승환계약 규제가 한층 촘촘해지고, 위반 시 과징금 상한이 상향됩니다. 시행 전 모집·준법 체계 정비가 필요합니다.<\/p>\n    <div class=\"law-chips\">\n      <div class=\"law-chip\"><span class=\"chip-label\">법률 시행<\/span><span class=\"chip-val hi\">2026. 12. 4.<\/span><\/div>\n      <div class=\"law-chip\"><span class=\"chip-label\">공포일<\/span><span class=\"chip-val\">2026. 6. 3.<\/span><\/div>\n      <div class=\"law-chip\"><span class=\"chip-label\">주요 개정사항<\/span><span class=\"chip-val\">4가지<\/span><\/div>\n    <\/div>\n  <\/div>\n\n  <!-- 개정 배경 -->\n  <div class=\"card\">\n    <span class=\"card-num\">01<\/span>\n    <div class=\"card-tag\">Background · 개정 배경<\/div>\n    <h3>왜 법이 바뀌었나요?<\/h3>\n    <ul class=\"reason-list\">\n      <li><div class=\"ri\">📉<\/div>불완전판매·부당승환 민원이 지속적으로 증가<\/li>\n      <li><div class=\"ri\">⚖️<\/div>설명의무 위반에 대한 제재 실효성 강화 요구<\/li>\n      <li><div class=\"ri\">🔒<\/div>소비자 보호 중심으로 모집질서 규율 재정비<\/li>\n      <li><div class=\"ri\">🏢<\/div>금융소비자보호법과의 정합성 확보 필요<\/li>\n    <\/ul>\n  <\/div>\n\n  <!-- 주요 개정사항 -->\n  <div class=\"card\">\n    <span class=\"card-num\">02<\/span>\n    <div class=\"card-tag\">Key Changes · 4대 개정<\/div>\n    <h3>이렇게 4가지가 달라집니다<\/h3>\n    <div class=\"changes-list\">\n      <div class=\"ci\"><div class=\"sn\">1<\/div><div><strong>설명의무 범위 확대<\/strong><span>주요 보장 제외사항·해지환급금 구조를 서면·전자문서로 명확히 안내<\/span><\/div><\/div>\n      <div class=\"ci\"><div class=\"sn\">2<\/div><div><strong>부당승환계약 규제 강화<\/strong><span>승환 비교안내 의무 위반 판단 기준을 구체화하고 입증책임 강화<\/span><\/div><\/div>\n      <div class=\"ci\"><div class=\"sn\">3<\/div><div><strong>과징금 상한 상향<\/strong><span>모집질서 위반 과징금 한도를 위반 관련 수입보험료 기준으로 상향<\/span><\/div><\/div>\n      <div class=\"ci\"><div class=\"sn\">4<\/div><div><strong>모집인 관리책임 명확화<\/strong><span>소속 설계사 위반에 대한 보험회사의 관리·감독 의무 명시<\/span><\/div><\/div>\n    <\/div>\n  <\/div>\n\n  <!-- 제재 강화 -->\n  <div class=\"card card-penalty\">\n    <span class=\"card-num\">03<\/span>\n    <div class=\"card-tag\">Risk · 제재 강화<\/div>\n    <h3>변경된 제재 내용<\/h3>\n    <div class=\"penalty-hero\">\n      <div class=\"pct\">상향<span><\/span><\/div>\n      <div class=\"pct-label\">모집질서 위반 과징금 상한<br><strong>정액 한도<\/strong> → <strong>수입보험료 연동<\/strong><\/div>\n    <\/div>\n    <div class=\"cond-row\"><div class=\"rdot\"><\/div>설명의무·부당승환 위반이 반복·조직적일 때 가중<\/div>\n    <div class=\"cond-row\"><div class=\"rdot\"><\/div>위반 관련 수입보험료를 기준으로 과징금 산정<\/div>\n    <div class=\"miti\"><strong>💡 감경·완화 방법<\/strong><br>자율 시정·피해 구제, 내부통제 적정 운영이 인정되면 과징금 감경 사유로 고려될 수 있습니다.<\/div>\n  <\/div>\n\n  <!-- 타임라인 -->\n  <div class=\"card\">\n    <span class=\"card-num\">04<\/span>\n    <div class=\"card-tag\">Schedule · 시행 일정<\/div>\n    <h3>언제부터 적용되나요?<\/h3>\n    <div class=\"timeline\">\n      <div class=\"tl-item\">\n        <div class=\"tl-dot\"><\/div>\n        <div class=\"tl-date\">2026. 6. 3.<\/div>\n        <div class=\"tl-label\">법률 공포<\/div>\n        <div class=\"tl-desc\">법률 제20987호<\/div>\n      <\/div>\n      <div class=\"tl-item\">\n        <div class=\"tl-dot key\"><\/div>\n        <div class=\"tl-date k\">2026. 12. 4.<span class=\"kbadge\">D-DAY<\/span><\/div>\n        <div class=\"tl-label\">시행<\/div>\n        <div class=\"tl-desc\">공포 후 6개월 경과, 전 조항 효력 발생<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <!-- 보험업 영향(추가 컨텍스트) -->\n  <div class=\"card card-info\">\n    <span class=\"card-num\">05<\/span>\n    <div class=\"card-tag\">Context · 보험업 영향<\/div>\n    <h3>우리 회사에는 어떤 의미인가요?<\/h3>\n    <div class=\"it-list\">\n      <div class=\"it-item\"><div class=\"it-num-label\"><div class=\"it-circle\">①<\/div><strong>모집 단계<\/strong><\/div><p>설명 스크립트·청약서식·전자서명 화면에 확대된 설명항목 반영 필요<\/p><\/div>\n      <div class=\"it-item\"><div class=\"it-num-label\"><div class=\"it-circle\">②<\/div><strong>준법·감사<\/strong><\/div><p>승환계약 비교안내 이행 점검 항목 신설, 위반 시 과징금 리스크 사전 평가<\/p><\/div>\n      <div class=\"it-item\"><div class=\"it-num-label\"><div class=\"it-circle\">③<\/div><strong>교육<\/strong><\/div><p>설계사 대상 부당승환·설명의무 교육 커리큘럼 업데이트<\/p><\/div>\n    <\/div>\n  <\/div>\n\n  <!-- 실무 대응 -->\n  <div class=\"card card-action row-full\">\n    <div class=\"card-tag\">Action Plan · 보험업 실무 대응<\/div>\n    <h3>시행 전 우리 회사가 해야 할 4가지<\/h3>\n    <p class=\"action-intro\">2026. 12. 4. 시행 이전까지 아래 4가지 내부 체계 점검을 완료해 주시기 바랍니다.<\/p>\n    <div class=\"action-grid\">\n      <div class=\"ai\"><div class=\"an\">1<\/div><strong>설명자료 정비<\/strong><p>상품설명서·청약서식·전자청약 화면의 설명항목을 개정 기준에 맞게 보완<\/p><\/div>\n      <div class=\"ai\"><div class=\"an\">2<\/div><strong>승환 점검 절차<\/strong><p>비교안내 이행 여부를 모집 단계에서 확인·기록하는 절차 구축<\/p><\/div>\n      <div class=\"ai\"><div class=\"an\">3<\/div><strong>제재 리스크 평가<\/strong><p>과징금 산정 기준 변경에 따른 노출 규모를 시나리오별로 산정<\/p><\/div>\n      <div class=\"ai\"><div class=\"an\">4<\/div><strong>설계사 교육<\/strong><p>개정 설명의무·부당승환 규제에 대한 의무 교육 실시<\/p><\/div>\n    <\/div>\n    <div class=\"deadline-bar\"><span class=\"di\">📅<\/span><span>체계 점검 완료 목표: <strong>2026. 11. 30.<\/strong> (시행 전)<\/span><\/div>\n  <\/div>\n\n  <!-- 원문 자료 -->\n  <div class=\"card card-refs row-full\">\n    <div class=\"card-tag\">Source Documents · 원문 자료<\/div>\n    <h3>신구조문대비표 &amp; 개정이유 원문 확인<\/h3>\n    <p class=\"refs-desc\">아래 버튼을 클릭하면 국가법령정보센터 원문이 새 창에서 열립니다.<\/p>\n    <div class=\"refs-grid\" style=\"grid-template-columns:1fr;\">\n      <div class=\"ref-group law-act\">\n        <div class=\"ref-group-label\">보험업법 &nbsp;|&nbsp; 법률 제20987호<\/div>\n        <div class=\"ref-links\">\n          <a class=\"ref-link\" href=\"https://www.law.go.kr/법령/보험업법\" target=\"_blank\" rel=\"noopener\">\n            <div class=\"ref-link-inner\"><div class=\"ref-icon\">📋<\/div><div class=\"ref-text\"><strong>법령 본문 · 개정이유<\/strong><span>law.go.kr · 보험업법<\/span><\/div><\/div>\n            <span class=\"ref-arrow\">→<\/span>\n          <\/a>\n        <\/div>\n      <\/div>\n    <\/div>\n    <div class=\"refs-note\">💡 원문 링크는 국가법령정보센터(law.go.kr)로 연결됩니다. 사내 배포 시 신구조문대비표 HWP를 같은 폴더에 첨부해 주세요.<\/div>\n  <\/div>\n\n<\/div>\n\n<footer>\n  <strong>미래에셋생명 법무팀<\/strong>\n  <span>2026. 06. 발행 &nbsp;·&nbsp; 본 자료는 사내 교육·공유 목적으로 제작되었습니다 &nbsp;·&nbsp; 문의: 법무팀<\/span>\n<\/footer>"},
  "files/pipa-decree.html": {"css": "\n/*\n * 미래에셋생명 법무팀 — 법령 제·개정 카드뉴스 디자인 시스템\n * 이 파일을 HTML <style> 태그 안에 그대로 삽입한다.\n * 색상·여백·타이포그래피를 임의로 바꾸지 말 것.\n */\n\n:root {\n  --orange:     #F58220;\n  --orange-lt:  #FEF0E3;\n  --orange-md:  #FDDCBA;\n  --blue:       #043B72;\n  --blue-lt:    #E8EFF7;\n  --gray-1:     #F7F8FA;\n  --gray-2:     #ECEFF4;\n  --gray-3:     #A0A6A8;\n  --gray-4:     #5A6370;\n  --text:       #1A1E23;\n  --red:        #D93025;\n  --r-card:     16px;\n  --r-sm:       10px;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\nbody {\n  font-family: 'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;\n  background: var(--gray-1);\n  padding: 48px 32px 64px;\n  color: var(--text);\n}\n.page-header {\n  max-width: 960px; margin: 0 auto 36px;\n  border-bottom: 2px solid var(--orange);\n  padding-bottom: 16px;\n  display: flex; align-items: flex-end;\n  justify-content: space-between; gap: 16px; flex-wrap: wrap;\n}\n.eyebrow { font-size:10px; font-weight:800; letter-spacing:3px; color:var(--orange); text-transform:uppercase; margin-bottom:5px; }\n.page-header h1 { font-size:24px; font-weight:900; color:var(--blue); line-height:1.25; }\n.header-right { font-size:11.5px; color:var(--gray-3); line-height:1.75; text-align:right; }\n.header-right strong { color:var(--blue); }\n.layout {\n  max-width: 960px; margin: 0 auto;\n  display: grid; grid-template-columns: 1fr 1fr; gap: 18px;\n}\n.card {\n  background: #fff; border-radius: var(--r-card);\n  border: 1px solid var(--gray-2); padding: 28px 26px 26px;\n  position: relative; overflow: hidden; display: flex; flex-direction: column;\n}\n.card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:var(--orange); }\n.card-tag { font-size:10px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase; color:var(--orange); margin-bottom:6px; }\n.card-num { position:absolute; top:16px; right:20px; font-size:48px; font-weight:900; color:var(--gray-2); line-height:1; letter-spacing:-2px; }\n.card h3 { font-size:17px; font-weight:800; color:var(--blue); line-height:1.4; margin-bottom:18px; }\n.row-full { grid-column: 1 / -1; }\n/* COVER */\n.card-cover { background:var(--blue); border-color:var(--blue); }\n.card-cover::before { background:var(--orange); }\n.card-cover .card-tag { color:var(--orange); }\n.card-cover h2 { font-size:22px; font-weight:900; color:#fff; line-height:1.4; margin:10px 0 16px; }\n.card-cover h2 em { color:var(--orange); font-style:normal; }\n.cover-desc { font-size:13px; color:rgba(255,255,255,0.6); line-height:1.7; margin-bottom:20px; flex:1; }\n.law-chips { display:flex; flex-direction:column; gap:8px; }\n.law-chip { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.13); border-radius:var(--r-sm); padding:10px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px; }\n.chip-label { font-size:11px; color:rgba(255,255,255,0.48); }\n.chip-val { font-size:13px; font-weight:700; color:#fff; }\n.chip-val.hi { color:var(--orange); }\n/* REASON LIST */\n.reason-list { list-style:none; flex:1; display:flex; flex-direction:column; justify-content:space-between; }\n.reason-list li { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid var(--gray-2); font-size:13px; color:var(--gray-4); line-height:1.6; }\n.reason-list li:last-child { border-bottom:none; }\n.ri { width:28px; height:28px; border-radius:8px; background:var(--orange-lt); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; margin-top:1px; }\n/* CHANGES */\n.changes-list { flex:1; display:flex; flex-direction:column; justify-content:space-between; }\n.ci { display:flex; align-items:flex-start; gap:12px; padding:11px 0; border-bottom:1px solid var(--gray-2); }\n.ci:last-child { border-bottom:none; }\n.sn { width:24px; height:24px; border-radius:50%; background:var(--orange); color:#fff; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }\n.ci strong { display:block; font-size:13px; font-weight:700; color:var(--blue); margin-bottom:2px; }\n.ci span { font-size:12px; color:var(--gray-4); line-height:1.5; }\n/* PENALTY */\n.card-penalty::before { background:var(--red); }\n.card-penalty .card-tag, .card-penalty h3 { color:var(--red); }\n.penalty-hero { background:linear-gradient(135deg,#FFF1F0,#FFE4E2); border:1px solid #FFCBC7; border-radius:14px; padding:18px; text-align:center; margin-bottom:16px; }\n.pct { font-size:54px; font-weight:900; color:var(--red); line-height:1; }\n.pct span { font-size:22px; }\n.pct-label { font-size:12px; color:#8B3A35; margin-top:5px; line-height:1.55; }\n.pct-label strong { color:var(--red); }\n.cond-row { display:flex; align-items:flex-start; gap:10px; font-size:12.5px; color:var(--gray-4); padding:9px 0; border-bottom:1px solid var(--gray-2); line-height:1.55; }\n.cond-row:last-of-type { border-bottom:none; }\n.rdot { width:6px; height:6px; border-radius:50%; background:var(--red); flex-shrink:0; margin-top:6px; }\n.miti { margin-top:14px; background:var(--blue-lt); border-left:3px solid var(--blue); border-radius:0 var(--r-sm) var(--r-sm) 0; padding:11px 14px; font-size:12px; color:var(--blue); line-height:1.65; }\n.miti strong { font-weight:800; }\n/* TIMELINE */\n.timeline { position:relative; padding-left:22px; flex:1; }\n.timeline::before { content:''; position:absolute; left:5px; top:8px; bottom:8px; width:2px; background:linear-gradient(to bottom, var(--orange), var(--gray-2)); }\n.tl-item { position:relative; padding-bottom:18px; }\n.tl-item:last-child { padding-bottom:0; }\n.tl-dot { position:absolute; left:-18px; top:4px; width:12px; height:12px; border-radius:50%; background:var(--orange-md); border:2px solid var(--orange); }\n.tl-dot.key { background:var(--orange); border-color:var(--blue); width:14px; height:14px; left:-19px; top:3px; }\n.tl-date { font-size:10.5px; font-weight:700; color:var(--gray-3); margin-bottom:2px; }\n.tl-date.k { color:var(--orange); }\n.tl-label { font-size:14px; font-weight:800; color:var(--blue); margin-bottom:2px; }\n.tl-desc { font-size:11.5px; color:var(--gray-4); line-height:1.55; }\n.kbadge { display:inline-block; background:var(--orange); color:#fff; font-size:9px; font-weight:800; padding:2px 7px; border-radius:20px; margin-left:6px; vertical-align:middle; }\n/* DECREE DETAILS */\n.it-list { flex:1; display:flex; flex-direction:column; justify-content:space-between; }\n.it-item { padding:13px 0; border-bottom:1px solid var(--gray-2); }\n.it-item:last-child { border-bottom:none; }\n.it-num-label { display:flex; align-items:center; gap:8px; margin-bottom:6px; }\n.it-circle { width:22px; height:22px; border-radius:50%; background:var(--blue); color:#fff; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }\n.it-item strong { font-size:13px; font-weight:700; color:var(--blue); }\n.it-item p { font-size:12px; color:var(--gray-4); line-height:1.6; padding-left:30px; }\n/* ACTION PLAN */\n.action-intro { font-size:13px; color:var(--gray-4); line-height:1.6; margin-bottom:18px; }\n.action-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }\n.ai { background:var(--gray-1); border:1px solid var(--gray-2); border-radius:var(--r-sm); padding:16px; }\n.ai .an { width:28px; height:28px; border-radius:8px; background:var(--blue); color:#fff; font-size:12px; font-weight:900; display:flex; align-items:center; justify-content:center; margin-bottom:10px; }\n.ai strong { display:block; font-size:13px; font-weight:800; color:var(--blue); margin-bottom:6px; line-height:1.4; }\n.ai p { font-size:12px; color:var(--gray-4); line-height:1.6; }\n.deadline-bar { margin-top:18px; background:var(--orange-lt); border:1px solid var(--orange-md); border-radius:var(--r-sm); padding:12px 18px; display:flex; align-items:center; gap:12px; font-size:13px; color:var(--blue); }\n.deadline-bar .di { font-size:18px; flex-shrink:0; }\n.deadline-bar strong { color:var(--orange); font-weight:800; }\n/* SOURCE DOCS */\n.card-refs::before { background:var(--blue); }\n.card-refs .card-tag, .card-refs h3 { color:var(--blue); }\n.refs-desc { font-size:12.5px; color:var(--gray-4); margin-bottom:18px; line-height:1.6; }\n.refs-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }\n.ref-group { background:var(--gray-1); border:1px solid var(--gray-2); border-radius:var(--r-sm); padding:16px 18px; }\n.ref-group-label { font-size:10.5px; font-weight:800; letter-spacing:1.5px; color:var(--gray-3); text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:7px; }\n.ref-group-label::before { content:\"\"; display:inline-block; width:3px; height:13px; border-radius:2px; background:var(--blue); }\n.ref-group.law-act .ref-group-label::before { background:var(--orange); }\n.ref-links { display:flex; flex-direction:column; gap:8px; }\n.ref-link { display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--gray-2); border-radius:8px; padding:11px 14px; text-decoration:none; color:inherit; transition:border-color .15s,box-shadow .15s; }\n.ref-link:hover { border-color:var(--blue); box-shadow:0 2px 8px rgba(4,59,114,.10); }\n.ref-group.law-act .ref-link:hover { border-color:var(--orange); box-shadow:0 2px 8px rgba(245,130,32,.12); }\n.ref-link-inner { display:flex; align-items:center; gap:10px; }\n.ref-icon { width:32px; height:32px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; background:var(--blue-lt); }\n.ref-group.law-act .ref-icon { background:var(--orange-lt); }\n.ref-text strong { display:block; font-size:13px; font-weight:700; color:var(--blue); margin-bottom:2px; }\n.ref-group.law-act .ref-text strong { color:#B45309; }\n.ref-text span { font-size:11px; color:var(--gray-3); }\n.ref-arrow { font-size:14px; color:var(--gray-3); flex-shrink:0; transition:transform .15s,color .15s; }\n.ref-link:hover .ref-arrow { transform:translateX(3px); color:var(--blue); }\n.ref-group.law-act .ref-link:hover .ref-arrow { color:var(--orange); }\n.refs-note { margin-top:14px; background:var(--blue-lt); border-left:3px solid var(--blue); border-radius:0 var(--r-sm) var(--r-sm) 0; padding:10px 14px; font-size:11.5px; color:var(--blue); line-height:1.65; }\n/* CALLOUT */\n.callout { background:var(--orange-lt); border-left:3px solid var(--orange); border-radius:0 var(--r-sm) var(--r-sm) 0; padding:11px 14px; font-size:12px; color:#7A4A00; line-height:1.65; margin-top:14px; }\n.callout strong { font-weight:800; color:var(--orange); }\n/* FOOTER */\nfooter { max-width:960px; margin:32px auto 0; border-top:1px solid var(--gray-2); padding-top:16px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; font-size:11px; color:var(--gray-3); }\nfooter strong { color:var(--blue); }\n\n", "body": "<div class=\"page-header\">\n  <div>\n    <div class=\"eyebrow\">Law Update · 법령 제·개정 안내<\/div>\n    <h1>개인정보 보호법 시행령 개정 핵심 정리<\/h1>\n  <\/div>\n  <div class=\"header-right\">\n    <strong>미래에셋생명 법무팀<\/strong><br>\n    2026. 06. 발행<br>\n    대통령령 제36121호\n  <\/div>\n<\/div>\n\n<div class=\"layout\">\n\n  <div class=\"card card-cover\">\n    <div class=\"card-tag\">Overview<\/div>\n    <h2>개인정보 보호법 시행령,<br><em>안전조치·전송요구<\/em>가 구체화됩니다<\/h2>\n    <p class=\"cover-desc\">안전조치 기준이 세분화되고 개인정보 전송요구권의 세부 절차가 신설됩니다. 보유 중인 고객 개인정보 관리체계 재점검이 필요합니다.<\/p>\n    <div class=\"law-chips\">\n      <div class=\"law-chip\"><span class=\"chip-label\">시행령 시행<\/span><span class=\"chip-val hi\">2026. 8. 20.<\/span><\/div>\n      <div class=\"law-chip\"><span class=\"chip-label\">공포일<\/span><span class=\"chip-val\">2026. 5. 19.<\/span><\/div>\n      <div class=\"law-chip\"><span class=\"chip-label\">주요 개정사항<\/span><span class=\"chip-val\">3가지<\/span><\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"card\">\n    <span class=\"card-num\">01<\/span>\n    <div class=\"card-tag\">Background · 개정 배경<\/div>\n    <h3>왜 시행령이 바뀌었나요?<\/h3>\n    <ul class=\"reason-list\">\n      <li><div class=\"ri\">🔒<\/div>대규모 개인정보 유출 사고가 반복되며 안전조치 강화 필요<\/li>\n      <li><div class=\"ri\">🌐<\/div>개인정보 전송요구권(마이데이터) 본격 시행에 따른 절차 정비<\/li>\n      <li><div class=\"ri\">⚖️<\/div>상위법 개정사항을 시행령에서 구체화할 필요<\/li>\n    <\/ul>\n  <\/div>\n\n  <div class=\"card\">\n    <span class=\"card-num\">02<\/span>\n    <div class=\"card-tag\">Key Changes · 3대 개정<\/div>\n    <h3>이렇게 3가지가 달라집니다<\/h3>\n    <div class=\"changes-list\">\n      <div class=\"ci\"><div class=\"sn\">1<\/div><div><strong>안전조치 기준 구체화<\/strong><span>접근권한 관리·암호화·접속기록 보관 등 기술적·관리적 조치를 세분화<\/span><\/div><\/div>\n      <div class=\"ci\"><div class=\"sn\">2<\/div><div><strong>전송요구권 절차 신설<\/strong><span>전송 대상 정보·방식·전송기한 등 처리 절차를 구체적으로 규정<\/span><\/div><\/div>\n      <div class=\"ci\"><div class=\"sn\">3<\/div><div><strong>유출통지 기준 정비<\/strong><span>유출 통지·신고 기준과 시한을 명확히 하고 통지 항목을 보강<\/span><\/div><\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"card\">\n    <span class=\"card-num\">03<\/span>\n    <div class=\"card-tag\">Enforcement Decree · 시행령 핵심<\/div>\n    <h3>시행령에서 무엇이 바뀌나요?<\/h3>\n    <div class=\"it-list\">\n      <div class=\"it-item\"><div class=\"it-num-label\"><div class=\"it-circle\">①<\/div><strong>접속기록 보관·점검<\/strong><\/div><p>개인정보처리시스템 접속기록 보관기간·점검 주기를 명확화<\/p><\/div>\n      <div class=\"it-item\"><div class=\"it-num-label\"><div class=\"it-circle\">②<\/div><strong>전송요구 처리체계<\/strong><\/div><p>고객의 전송요구를 접수·이행하는 표준 절차 마련 필요<\/p><\/div>\n      <div class=\"it-item\"><div class=\"it-num-label\"><div class=\"it-circle\">③<\/div><strong>유출 대응 시한<\/strong><\/div><p>유출 인지 후 통지·신고까지의 시한 관리 체계 점검<\/p><\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"card\">\n    <span class=\"card-num\">04<\/span>\n    <div class=\"card-tag\">Schedule · 시행 일정<\/div>\n    <h3>언제부터 적용되나요?<\/h3>\n    <div class=\"timeline\">\n      <div class=\"tl-item\"><div class=\"tl-dot\"><\/div><div class=\"tl-date\">2026. 5. 19.<\/div><div class=\"tl-label\">시행령 공포<\/div><div class=\"tl-desc\">대통령령 제36121호<\/div><\/div>\n      <div class=\"tl-item\"><div class=\"tl-dot key\"><\/div><div class=\"tl-date k\">2026. 8. 20.<span class=\"kbadge\">D-DAY<\/span><\/div><div class=\"tl-label\">시행<\/div><div class=\"tl-desc\">전 조항 효력 발생<\/div><\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"card card-action row-full\">\n    <div class=\"card-tag\">Action Plan · 보험업 실무 대응<\/div>\n    <h3>시행 전 우리 회사가 해야 할 4가지<\/h3>\n    <p class=\"action-intro\">2026. 8. 20. 시행 이전까지 아래 4가지 점검을 완료해 주시기 바랍니다.<\/p>\n    <div class=\"action-grid\">\n      <div class=\"ai\"><div class=\"an\">1<\/div><strong>안전조치 점검<\/strong><p>접근권한·암호화·접속기록 등 강화된 기준 대비 현행 체계 점검<\/p><\/div>\n      <div class=\"ai\"><div class=\"an\">2<\/div><strong>전송요구 대응<\/strong><p>고객 전송요구 접수·이행 절차 및 담당 조직 정비<\/p><\/div>\n      <div class=\"ai\"><div class=\"an\">3<\/div><strong>유출 대응 체계<\/strong><p>유출 통지·신고 시한 관리 및 비상대응 절차 업데이트<\/p><\/div>\n      <div class=\"ai\"><div class=\"an\">4<\/div><strong>위탁사 점검<\/strong><p>개인정보 처리 위탁사의 안전조치 이행 여부 재확인<\/p><\/div>\n    <\/div>\n    <div class=\"deadline-bar\"><span class=\"di\">📅<\/span><span>체계 점검 완료 목표: <strong>2026. 8. 14.<\/strong> (시행 전)<\/span><\/div>\n  <\/div>\n\n  <div class=\"card card-refs row-full\">\n    <div class=\"card-tag\">Source Documents · 원문 자료<\/div>\n    <h3>신구조문대비표 &amp; 개정이유 원문 확인<\/h3>\n    <p class=\"refs-desc\">아래 버튼을 클릭하면 국가법령정보센터 원문이 새 창에서 열립니다.<\/p>\n    <div class=\"refs-grid\" style=\"grid-template-columns:1fr;\">\n      <div class=\"ref-group\">\n        <div class=\"ref-group-label\">개인정보 보호법 시행령 &nbsp;|&nbsp; 대통령령 제36121호<\/div>\n        <div class=\"ref-links\">\n          <a class=\"ref-link\" href=\"https://www.law.go.kr/법령/개인정보보호법시행령\" target=\"_blank\" rel=\"noopener\">\n            <div class=\"ref-link-inner\"><div class=\"ref-icon\">📋<\/div><div class=\"ref-text\"><strong>시행령 본문 · 개정이유<\/strong><span>law.go.kr · 개인정보 보호법 시행령<\/span><\/div><\/div>\n            <span class=\"ref-arrow\">→<\/span>\n          <\/a>\n        <\/div>\n      <\/div>\n    <\/div>\n    <div class=\"refs-note\">💡 원문 링크는 국가법령정보센터(law.go.kr)로 연결됩니다.<\/div>\n  <\/div>\n\n<\/div>\n\n<footer>\n  <strong>미래에셋생명 법무팀<\/strong>\n  <span>2026. 06. 발행 &nbsp;·&nbsp; 본 자료는 사내 교육·공유 목적으로 제작되었습니다 &nbsp;·&nbsp; 문의: 법무팀<\/span>\n<\/footer>"},
  "files/capital-markets-decree.html": {"css": "\n/*\n * 미래에셋생명 법무팀 — 법령 제·개정 카드뉴스 디자인 시스템\n * 이 파일을 HTML <style> 태그 안에 그대로 삽입한다.\n * 색상·여백·타이포그래피를 임의로 바꾸지 말 것.\n */\n\n:root {\n  --orange:     #F58220;\n  --orange-lt:  #FEF0E3;\n  --orange-md:  #FDDCBA;\n  --blue:       #043B72;\n  --blue-lt:    #E8EFF7;\n  --gray-1:     #F7F8FA;\n  --gray-2:     #ECEFF4;\n  --gray-3:     #A0A6A8;\n  --gray-4:     #5A6370;\n  --text:       #1A1E23;\n  --red:        #D93025;\n  --r-card:     16px;\n  --r-sm:       10px;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\nbody {\n  font-family: 'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;\n  background: var(--gray-1);\n  padding: 48px 32px 64px;\n  color: var(--text);\n}\n.page-header {\n  max-width: 960px; margin: 0 auto 36px;\n  border-bottom: 2px solid var(--orange);\n  padding-bottom: 16px;\n  display: flex; align-items: flex-end;\n  justify-content: space-between; gap: 16px; flex-wrap: wrap;\n}\n.eyebrow { font-size:10px; font-weight:800; letter-spacing:3px; color:var(--orange); text-transform:uppercase; margin-bottom:5px; }\n.page-header h1 { font-size:24px; font-weight:900; color:var(--blue); line-height:1.25; }\n.header-right { font-size:11.5px; color:var(--gray-3); line-height:1.75; text-align:right; }\n.header-right strong { color:var(--blue); }\n.layout {\n  max-width: 960px; margin: 0 auto;\n  display: grid; grid-template-columns: 1fr 1fr; gap: 18px;\n}\n.card {\n  background: #fff; border-radius: var(--r-card);\n  border: 1px solid var(--gray-2); padding: 28px 26px 26px;\n  position: relative; overflow: hidden; display: flex; flex-direction: column;\n}\n.card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:var(--orange); }\n.card-tag { font-size:10px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase; color:var(--orange); margin-bottom:6px; }\n.card-num { position:absolute; top:16px; right:20px; font-size:48px; font-weight:900; color:var(--gray-2); line-height:1; letter-spacing:-2px; }\n.card h3 { font-size:17px; font-weight:800; color:var(--blue); line-height:1.4; margin-bottom:18px; }\n.row-full { grid-column: 1 / -1; }\n/* COVER */\n.card-cover { background:var(--blue); border-color:var(--blue); }\n.card-cover::before { background:var(--orange); }\n.card-cover .card-tag { color:var(--orange); }\n.card-cover h2 { font-size:22px; font-weight:900; color:#fff; line-height:1.4; margin:10px 0 16px; }\n.card-cover h2 em { color:var(--orange); font-style:normal; }\n.cover-desc { font-size:13px; color:rgba(255,255,255,0.6); line-height:1.7; margin-bottom:20px; flex:1; }\n.law-chips { display:flex; flex-direction:column; gap:8px; }\n.law-chip { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.13); border-radius:var(--r-sm); padding:10px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px; }\n.chip-label { font-size:11px; color:rgba(255,255,255,0.48); }\n.chip-val { font-size:13px; font-weight:700; color:#fff; }\n.chip-val.hi { color:var(--orange); }\n/* REASON LIST */\n.reason-list { list-style:none; flex:1; display:flex; flex-direction:column; justify-content:space-between; }\n.reason-list li { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid var(--gray-2); font-size:13px; color:var(--gray-4); line-height:1.6; }\n.reason-list li:last-child { border-bottom:none; }\n.ri { width:28px; height:28px; border-radius:8px; background:var(--orange-lt); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; margin-top:1px; }\n/* CHANGES */\n.changes-list { flex:1; display:flex; flex-direction:column; justify-content:space-between; }\n.ci { display:flex; align-items:flex-start; gap:12px; padding:11px 0; border-bottom:1px solid var(--gray-2); }\n.ci:last-child { border-bottom:none; }\n.sn { width:24px; height:24px; border-radius:50%; background:var(--orange); color:#fff; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }\n.ci strong { display:block; font-size:13px; font-weight:700; color:var(--blue); margin-bottom:2px; }\n.ci span { font-size:12px; color:var(--gray-4); line-height:1.5; }\n/* PENALTY */\n.card-penalty::before { background:var(--red); }\n.card-penalty .card-tag, .card-penalty h3 { color:var(--red); }\n.penalty-hero { background:linear-gradient(135deg,#FFF1F0,#FFE4E2); border:1px solid #FFCBC7; border-radius:14px; padding:18px; text-align:center; margin-bottom:16px; }\n.pct { font-size:54px; font-weight:900; color:var(--red); line-height:1; }\n.pct span { font-size:22px; }\n.pct-label { font-size:12px; color:#8B3A35; margin-top:5px; line-height:1.55; }\n.pct-label strong { color:var(--red); }\n.cond-row { display:flex; align-items:flex-start; gap:10px; font-size:12.5px; color:var(--gray-4); padding:9px 0; border-bottom:1px solid var(--gray-2); line-height:1.55; }\n.cond-row:last-of-type { border-bottom:none; }\n.rdot { width:6px; height:6px; border-radius:50%; background:var(--red); flex-shrink:0; margin-top:6px; }\n.miti { margin-top:14px; background:var(--blue-lt); border-left:3px solid var(--blue); border-radius:0 var(--r-sm) var(--r-sm) 0; padding:11px 14px; font-size:12px; color:var(--blue); line-height:1.65; }\n.miti strong { font-weight:800; }\n/* TIMELINE */\n.timeline { position:relative; padding-left:22px; flex:1; }\n.timeline::before { content:''; position:absolute; left:5px; top:8px; bottom:8px; width:2px; background:linear-gradient(to bottom, var(--orange), var(--gray-2)); }\n.tl-item { position:relative; padding-bottom:18px; }\n.tl-item:last-child { padding-bottom:0; }\n.tl-dot { position:absolute; left:-18px; top:4px; width:12px; height:12px; border-radius:50%; background:var(--orange-md); border:2px solid var(--orange); }\n.tl-dot.key { background:var(--orange); border-color:var(--blue); width:14px; height:14px; left:-19px; top:3px; }\n.tl-date { font-size:10.5px; font-weight:700; color:var(--gray-3); margin-bottom:2px; }\n.tl-date.k { color:var(--orange); }\n.tl-label { font-size:14px; font-weight:800; color:var(--blue); margin-bottom:2px; }\n.tl-desc { font-size:11.5px; color:var(--gray-4); line-height:1.55; }\n.kbadge { display:inline-block; background:var(--orange); color:#fff; font-size:9px; font-weight:800; padding:2px 7px; border-radius:20px; margin-left:6px; vertical-align:middle; }\n/* DECREE DETAILS */\n.it-list { flex:1; display:flex; flex-direction:column; justify-content:space-between; }\n.it-item { padding:13px 0; border-bottom:1px solid var(--gray-2); }\n.it-item:last-child { border-bottom:none; }\n.it-num-label { display:flex; align-items:center; gap:8px; margin-bottom:6px; }\n.it-circle { width:22px; height:22px; border-radius:50%; background:var(--blue); color:#fff; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }\n.it-item strong { font-size:13px; font-weight:700; color:var(--blue); }\n.it-item p { font-size:12px; color:var(--gray-4); line-height:1.6; padding-left:30px; }\n/* ACTION PLAN */\n.action-intro { font-size:13px; color:var(--gray-4); line-height:1.6; margin-bottom:18px; }\n.action-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }\n.ai { background:var(--gray-1); border:1px solid var(--gray-2); border-radius:var(--r-sm); padding:16px; }\n.ai .an { width:28px; height:28px; border-radius:8px; background:var(--blue); color:#fff; font-size:12px; font-weight:900; display:flex; align-items:center; justify-content:center; margin-bottom:10px; }\n.ai strong { display:block; font-size:13px; font-weight:800; color:var(--blue); margin-bottom:6px; line-height:1.4; }\n.ai p { font-size:12px; color:var(--gray-4); line-height:1.6; }\n.deadline-bar { margin-top:18px; background:var(--orange-lt); border:1px solid var(--orange-md); border-radius:var(--r-sm); padding:12px 18px; display:flex; align-items:center; gap:12px; font-size:13px; color:var(--blue); }\n.deadline-bar .di { font-size:18px; flex-shrink:0; }\n.deadline-bar strong { color:var(--orange); font-weight:800; }\n/* SOURCE DOCS */\n.card-refs::before { background:var(--blue); }\n.card-refs .card-tag, .card-refs h3 { color:var(--blue); }\n.refs-desc { font-size:12.5px; color:var(--gray-4); margin-bottom:18px; line-height:1.6; }\n.refs-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }\n.ref-group { background:var(--gray-1); border:1px solid var(--gray-2); border-radius:var(--r-sm); padding:16px 18px; }\n.ref-group-label { font-size:10.5px; font-weight:800; letter-spacing:1.5px; color:var(--gray-3); text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:7px; }\n.ref-group-label::before { content:\"\"; display:inline-block; width:3px; height:13px; border-radius:2px; background:var(--blue); }\n.ref-group.law-act .ref-group-label::before { background:var(--orange); }\n.ref-links { display:flex; flex-direction:column; gap:8px; }\n.ref-link { display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--gray-2); border-radius:8px; padding:11px 14px; text-decoration:none; color:inherit; transition:border-color .15s,box-shadow .15s; }\n.ref-link:hover { border-color:var(--blue); box-shadow:0 2px 8px rgba(4,59,114,.10); }\n.ref-group.law-act .ref-link:hover { border-color:var(--orange); box-shadow:0 2px 8px rgba(245,130,32,.12); }\n.ref-link-inner { display:flex; align-items:center; gap:10px; }\n.ref-icon { width:32px; height:32px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; background:var(--blue-lt); }\n.ref-group.law-act .ref-icon { background:var(--orange-lt); }\n.ref-text strong { display:block; font-size:13px; font-weight:700; color:var(--blue); margin-bottom:2px; }\n.ref-group.law-act .ref-text strong { color:#B45309; }\n.ref-text span { font-size:11px; color:var(--gray-3); }\n.ref-arrow { font /* ── 오버레이 ── */
const overlay = document.getElementById('cn-overlay');
const content = document.getElementById('cn-content');
document.getElementById('cn-close').addEventListener('click', closeCard);
overlay.addEventListener('click', function(e) { if(e.target===overlay) closeCard(); });
document.addEventListener('keydown', function(e) { if(e.key==='Escape') closeCard(); });

function openCard(key) {
  var card = CARDNEWS[key];
  if (!card) return;
  content.innerHTML = '<style>' + card.css + '<\/style>' + card.body;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  overlay.scrollTop = 0;
}
function closeCard() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(function(){ content.innerHTML=''; }, 250);
}

/* ── 이벤트 위임 (data-key 속성으로 key 전달 — inline onclick 불사용) ── */
document.addEventListener('click', function(e) {
  var btn = e.target.closest('.news-btn');
  if (btn) {
    e.stopPropagation();
    openCard(btn.dataset.key);
    return;
  }
  var card = e.target.closest('.law-card.has-news');
  if (card) openCard(card.dataset.key);
});

/* ── 유틸 ── */
var impactLabel = {high:'영향 큼',mid:'영향 보통',low:'참고'};
function typeClass(t) { return t==='법률'?'law':(t.indexOf('령')>-1&&t.indexOf('규칙')===-1?'decree':'rule'); }
function fmtDate(d) {
  if(!d) return '미정';
  var p=d.split('-'); return p[0]+'. '+(+p[1])+'. '+(+p[2])+'.';
}

/* ── 카드 ── */
function lawCard(item) {
  var hasNews = !!item.cardnews;
  var tags = (item.tags||[]).map(function(t){ return '<span class="tag">#'+t+'</span>'; }).join('');
  var newsBtn = hasNews
    ? '<button class="news-btn" data-key="'+item.cardnews+'">📰 카드뉴스 보기 →</button>'
    : '<span class="news-soon">카드뉴스 준비중</span>';
  var dataKey = hasNews ? ' data-key="'+item.cardnews+'"' : '';
  return '<div class="law-card impact-'+item.impact+(hasNews?' has-news':'')+'"'+dataKey+'>'
    +'<div class="lc-top">'
    +'<span class="badge '+typeClass(item.lawType)+'">'+item.lawType+'</span>'
    +'<span class="badge rev">'+item.revisionType+'</span>'
    +'<span class="impact-pill '+item.impact+'">'+(impactLabel[item.impact]||'')+'</span>'
    +'</div>'
    +'<div class="lc-name">'+item.name+'</div>'
    +'<div class="lc-no">'+(item.promulgationNo||'')+'</div>'
    +'<div class="lc-summary">'+(item.summary||'')+'</div>'
    +'<div class="lc-dates">'
    +'<div class="lc-date"><span class="dl">공포일</span><span class="dv">'+fmtDate(item.promulgationDate)+'</span></div>'
    +'<div class="lc-date"><span class="dl">시행일</span><span class="dv hi">'+fmtDate(item.enforcementDate)+'</span></div>'
    +'</div>'
    +'<div class="lc-tags">'+tags+'</div>'
    +'<div class="lc-foot"><span class="ministry">🏛 '+(item.ministry||'')+'</span>'+newsBtn+'</div>'
    +'</div>';
}

/* ── 렌더 ── */
function render(data) {

  var sections = document.getElementById('sections');
  function draw(filter) {
    sections.innerHTML = data.months
      .filter(function(m){ return filter==='all'||m.month===filter; })

        var nc = m.items.filter(function(i){ return i.cardnews; }).length;
        return '<div class="month-section"><h2>'+m.label+' <span class="m-sub">· '+m.items.length+'건'+(nc?' · 카드뉴스 '+nc+'건':'')+'</span></h2>'

      }).join('');
